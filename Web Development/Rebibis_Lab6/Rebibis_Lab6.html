    <body> 
        
        <div class = "container">
            <h1 align="left"> Inventory Management System </h1>

        <form class = "submit">

            <input type = "number" placeholder = "Price" required>
            <input type = "number" placeholder = "Stock Quantity" required>
            <button id = "add-product" type = "submit"> Add Product </button>
        </form>
        
        <br>

        <div class = "prod-table">

        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Item Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>
            </thead>

            <tbody id="table-body">
            </tbody>
        </table>

        <script src="Rebibis_Lab7.js"></script>
        </div>
    </div>
    
    </body>
